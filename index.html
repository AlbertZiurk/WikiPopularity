<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiPopularity</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="h-screen overflow-hidden bg-gray-100 p-4">

    <main class="h-full w-full max-w-5xl mx-auto bg-white rounded-2xl shadow-lg flex flex-col p-4">

        <header class="text-center shrink-0">

            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">
                WikiPopularity
            </h1>

            <p class="text-gray-500 text-xs md:text-sm mt-2">
                Compare a quantidade de visualizações da Wikipédia por artigo em tempo real.
            </p>

        </header>

        <section class="flex flex-col sm:flex-row gap-3 items-center justify-center my-4 shrink-0">

            <input type="text" id="article" placeholder="Digite o artigo"
                class="w-full sm:w-1/2 border border-gray-300 rounded-lg px-3 py-2 text-sm">

            <button id="btnSearch"
                class="w-full sm:w-auto bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm">
                Pesquisar
            </button>

        </section>

        <section class="flex-1 min-h-0">

            <canvas id="chart" class="w-full h-full"></canvas>

        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script/script.js"></script>

</body>

</html>
